services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vitto_lending
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/adapters/persistence/postgres/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      POSTGRES_URL: postgresql://postgres:postgres@postgres:5432/vitto_lending
      MONGODB_URL: mongodb://mongo:27017/vitto_lending
      CORS_ORIGIN: http://localhost:5173
      ANNUAL_INTEREST_RATE_PCT: 18
      APPROVAL_SCORE_THRESHOLD: 60
    depends_on:
      - postgres
      - mongo
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:4000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    command: npm run dev

volumes:
  postgres_data:
  mongo_data:
